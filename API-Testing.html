
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>API Test</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 60px auto; padding: 0 1rem; }
    button { padding: 10px 20px; font-size: 15px; cursor: pointer; }
    #result { margin-top: 1.5rem; padding: 12px; border-radius: 8px; font-size: 14px; line-height: 1.6; }
    .ok { background: #d1fae5; color: #065f46; }
    .err { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>
  <h2>API-Verbindungstest</h2>
  <p>Prüft API-Key</p>
  <button onclick="testAPI()">Test starten</button>
  <div id="result"></div>

  <script>
    async function testAPI() {
      const el = document.getElementById('result');
      el.className = '';
      el.textContent = 'Verbindung wird getestet…';

      try {
        const resp = await fetch("https://anthropic-proxy.arne-putscher.workers.dev", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 50,
            messages: [{ role: "user", content: "Antworte nur mit: Verbindung erfolgreich!" }]
          })
        });

        const data = await resp.json();
        const text = data.content?.[0]?.text;

        if (text) {
          el.className = 'ok';
          el.textContent = '✓ ' + text;
        } else {
          el.className = 'err';
          el.textContent = '✗ Unerwartete Antwort: ' + JSON.stringify(data);
        }
      } catch (err) {
        el.className = 'err';
        el.textContent = '✗ Fehler: ' + err.message;
      }
    }
  </script>
</body>
</html>
